<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merienda:wght@300..900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
  <title>DnD Quiz</title>
</head>
<body>
  <div class="container">
    <div class="row">
      <div class="col-12 col-lg-6 offset-lg-3 main">
        <div>
          <div class="title">DnD Quiz</div>
          <div class="para">Welcome to the Dungeons and Dragons quiz. Test what you know about the twelve Class options found in the Players Handbook, or the three hundred and thirty-four monsters found in the Monster Manual.</div>
        </div>
        <div class="d-flex">
          <button id="class" class="choice">Classes</button>
          <button id="monster" class="choice">Monsters</button>
        </div>
        <button id="start-btn">Start Quiz</button>
      </div>
    </div>
  </div>
  <script src="main.js" type="module"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
</body>
</html>
